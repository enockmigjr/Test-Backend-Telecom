version: '3.8'

services:
  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: telecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: telecom
      POSTGRES_PASSWORD: telecom_secret
      POSTGRES_DB: telecom_tickets
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U telecom -d telecom_tickets']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telecom-network

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: telecom-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telecom-network

  # ============================================
  # API NestJS (dev)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: telecom-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: telecom
      DATABASE_PASSWORD: telecom_secret
      DATABASE_NAME: telecom_tickets
      DATABASE_URL: postgresql://telecom:telecom_secret@postgres:5432/telecom_tickets
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
    volumes:
      - .:/app
      - api-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm run start:dev
    networks:
      - telecom-network

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: telecom-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - api
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - telecom-network

  # ============================================
  # Mailpit (SMTP de test)
  # ============================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: telecom-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '9025:8025'
    networks:
      - telecom-network

  # ============================================
  # Observabilité — Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: telecom-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - telecom-network

  # ============================================
  # Observabilité — Alertmanager (alertes)
  # ============================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: telecom-alertmanager
    restart: unless-stopped
    ports:
      - '9093:9093'
    environment:
      # WhatsApp webhook URL — à configurer pour la production
      # Utiliser un service comme CallMeBot, Twilio, ou un webhook personnalisé
      WHATSAPP_WEBHOOK_URL: 'https://webhook.example.com/whatsapp'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - telecom-network

  # ============================================
  # Observabilité — Loki (logs)
  # ============================================
  loki:
    image: grafana/loki:latest
    container_name: telecom-loki
    restart: unless-stopped
    user: '0:0' # <--- FORCE L'UTILISATEUR ROOT POUR LES DROITS
    ports:
      - '3100:3100'
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - telecom-network

  # ============================================
  # Observabilité — Tempo (traces)
  # ============================================
  tempo:
    image: grafana/tempo:latest
    container_name: telecom-tempo
    restart: unless-stopped
    user: '0:0' # <--- FORCE L'UTILISATEUR ROOT POUR LES DROITS
    ports:
      - '3200:3200'
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo/tempo-config.yml
    networks:
      - telecom-network

  # ============================================
  # Observabilité — Grafana (visualisation)
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: telecom-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ''
    ports:
      - '3001:3000'
    user: '0:0' # <--- AJOUTE CETTE LIGNE ICI
    volumes:
      - ./grafana/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - telecom-network

  # ============================================
  # Observabilité — Promtail (collecte logs)
  # ============================================
  promtail:
    image: grafana/promtail:latest
    container_name: telecom-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - telecom-network

  # ============================================
  # Monitoring — Uptime Kuma (heartbeat)
  # ============================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: telecom-uptime-kuma
    restart: unless-stopped
    ports:
      - '3002:3001'
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - telecom-network

volumes:
  postgres-data:
  redis-data:
  api-node-modules:
  prometheus-data:
  alertmanager-data:
  loki-data:
  tempo-data:
  grafana-data:
  uptime-kuma-data:

networks:
  telecom-network:
    driver: bridge
