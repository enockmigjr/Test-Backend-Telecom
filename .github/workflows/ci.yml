name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: '10'
  NODE_VERSION: '22'
  # Désactiver Husky en CI (pas de hooks git nécessaires)
  HUSKY: '0'

jobs:
  # ─── Qualité de code ────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

  # ─── Tests unitaires ────────────────────────────────────
  test:
    name: 🧪 Tests Unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm run test:unit -- --coverage
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: test-access-secret-min-32-chars!!
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars!!
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ─── Build ──────────────────────────────────────────────
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

  # ─── Tests E2E ───────────────────────────────────────────
  e2e:
    name: 🧪 Tests E2E
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telecom
          POSTGRES_PASSWORD: telecom_secret
          POSTGRES_DB: telecom_tickets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://telecom:telecom_secret@localhost:5432/telecom_tickets_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_ACCESS_SECRET: test-access-secret-min-32-chars!!
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars!!
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Push database schema
        run: pnpm run db:push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed test data
        run: pnpm run db:seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          NODE_ENV: ${{ env.NODE_ENV }}
          JWT_ACCESS_SECRET: ${{ env.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          LOG_LEVEL: ${{ env.LOG_LEVEL }}

  # ─── Analyse de sécurité ────────────────────────────────
  security:
    name: 🔒 Audit Sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ─── OWASP ZAP Security Scan ────────────────────────────
  zap-scan:
    name: 🔐 OWASP ZAP Scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telecom
          POSTGRES_PASSWORD: telecom_secret
          POSTGRES_DB: telecom_tickets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://telecom:telecom_secret@localhost:5432/telecom_tickets_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_ACCESS_SECRET: test-access-secret-min-32-chars!!
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars!!
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Push DB + seed
        run: |
          pnpm run db:push
          pnpm run db:seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Start API
        run: |
          node dist/main &
          echo "⏳ Waiting for API..."
          for i in $(seq 1 30); do
            curl -s http://localhost:3000/api/v1/health && break
            sleep 2
          done
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          NODE_ENV: ${{ env.NODE_ENV }}
          JWT_ACCESS_SECRET: ${{ env.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          LOG_LEVEL: ${{ env.LOG_LEVEL }}

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000'
          cmd_options: '-c zap-session.conf'
          fail_action: 'warn'
          allow_issue_writing: false

      - name: Stop API
        if: always()
        run: kill $(lsof -t -i:3000) || true

  # ─── Docker Build Check ──────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t telecom-api .
