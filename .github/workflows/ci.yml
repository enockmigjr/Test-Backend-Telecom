name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: '10'

jobs:
  # ─── Qualité de code ────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint
      - run: pnpm run format --check || true

  # ─── Tests unitaires ────────────────────────────────────
  test:
    name: 🧪 Tests Unitaires
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telecom
          POSTGRES_PASSWORD: telecom_secret
          POSTGRES_DB: telecom_tickets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm run db:push
        env:
          DATABASE_URL: postgresql://telecom:telecom_secret@localhost:5432/telecom_tickets_test
          REDIS_URL: redis://localhost:6379

      - name: Run tests
        run: pnpm run test -- --coverage
        env:
          DATABASE_URL: postgresql://telecom:telecom_secret@localhost:5432/telecom_tickets_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ─── Build ──────────────────────────────────────────────
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

  # ─── Tests E2E ───────────────────────────────────────────
  e2e:
    name: 🧪 Tests E2E
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telecom
          POSTGRES_PASSWORD: telecom_secret
          POSTGRES_DB: telecom_tickets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run db:push
        env:
          DATABASE_URL: postgresql://telecom:telecom_secret@localhost:5432/telecom_tickets_test
      - run: pnpm run db:seed
        env:
          DATABASE_URL: postgresql://telecom:telecom_secret@localhost:5432/telecom_tickets_test
      - run: pnpm run test:e2e
        env:
          DATABASE_URL: postgresql://telecom:telecom_secret@localhost:5432/telecom_tickets_test

  # ─── Analyse de sécurité ────────────────────────────────
  security:
    name: 🔒 Audit Sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm audit --audit-level=high
        continue-on-error: true

  # ─── Docker Build Check ──────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t telecom-api .
