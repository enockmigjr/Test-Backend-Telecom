worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logs → stdout/stderr pour collecte par Promtail → Loki ──
    access_log /dev/stdout combined;
    error_log  stderr warn;

    # Si X-Correlation-Id n'est pas fourni par le client, on utilise la variable intégrée $request_id
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        ""      $request_id;
    }

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    # ── Buffering requêtes (absorbe les clients lents) ──
    # NestJS reçoit la requête complète en une fois, pas de streaming partiel
    client_body_buffer_size     128k;
    client_max_body_size        10m;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 8k;
    proxy_request_buffering     on;
    proxy_buffering             on;
    proxy_buffer_size           16k;
    proxy_busy_buffers_size     32k;
    proxy_read_timeout          60s;
    proxy_send_timeout          60s;

    # ── Rate limiting ──
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    # Upstream vers l'API NestJS
    upstream api_upstream {
        server api:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Headers de sécurité
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Correlation-Id $correlation_id;

        # Renvoyer le correlation ID au client dans la réponse
        add_header X-Correlation-Id $correlation_id always;

        # Rate limiting global
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://api_upstream;
        }

        # Rate limiting strict pour login
        location /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://api_upstream;
        }

        # Proxy WebSocket
        location /socket.io/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
