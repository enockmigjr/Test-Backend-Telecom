global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: telecom-ticket-management

rule_files:
  - 'alert.rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['${ALERTMANAGER_HOST:-alertmanager}:${ALERTMANAGER_PORT:-9093}']

scrape_configs:
  - job_name: 'telecom-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['${API_HOST:-api}:${API_PORT:-3000}']
        labels:
          service: 'telecom-api'
          env: 'production'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):\d+'
        replacement: '$1'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['${PROMETHEUS_HOST:-localhost}:${PROMETHEUS_PORT:-9090}']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['${ALERTMANAGER_HOST:-alertmanager}:${ALERTMANAGER_PORT:-9093}']
