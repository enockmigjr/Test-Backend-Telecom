# ============================================================
# Prometheus — Configuration de Scraping
# ============================================================
# Les cibles ci-dessous utilisent les noms de service Docker
# (réseau interne telecom-network).
#
# Pour la production :
#   - alertmanager → ${ALERTMANAGER_HOST:-alertmanager}:${ALERTMANAGER_PORT:-9093}
#   - api          → ${API_HOST:-api}:${API_PORT:-3000}
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: telecom-ticket-management

rule_files:
  - 'alert.rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── API NestJS (métriques applicatives) ──
  - job_name: 'telecom-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['api:3000']
        labels:
          service: 'telecom-api'
          env: 'production'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):\d+'
        replacement: '$1'

  # ── Prometheus (auto-surveillance) ──
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Alertmanager ──
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
