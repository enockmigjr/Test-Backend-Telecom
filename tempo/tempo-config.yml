server:
  http_listen_port: ${TEMPO_HTTP_PORT:-3200}

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:${TEMPO_OTLP_HTTP_PORT:-4318}
        grpc:
          endpoint: 0.0.0.0:${TEMPO_OTLP_GRPC_PORT:-4317}

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 1000
