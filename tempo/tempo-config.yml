server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 1000

# Le bloc compactor et ingester moderne se configure via l'overrides ou au niveau global
# Pour éviter les erreurs de type app.Config, on laisse le stockage gérer la rétention locale.