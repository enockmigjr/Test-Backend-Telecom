# ============================================================
# Tempo — Configuration
# ============================================================
# Les ports ci-dessous sont les valeurs par défaut pour le
# réseau Docker interne (telecom-network).
#
# Pour la production :
#   - http_listen_port → utiliser TEMPO_HTTP_PORT (défaut: 3200)
#   - OTLP HTTP     → utiliser TEMPO_OTLP_HTTP_PORT (défaut: 4318)
#   - OTLP gRPC     → utiliser TEMPO_OTLP_GRPC_PORT (défaut: 4317)
# ============================================================

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/traces
    wal:
      path: /tmp/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 1000
