apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://${PROMETHEUS_HOST:-prometheus}:${PROMETHEUS_PORT:-9090}
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    url: http://${LOKI_HOST:-loki}:${LOKI_PORT:-3100}
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - matcherRegex: '"correlationId":"([a-zA-Z0-9-]+)"'
          name: correlationId
          url: '${__value.raw}'

  - name: Tempo
    type: tempo
    access: proxy
    url: http://${TEMPO_HOST:-tempo}:${TEMPO_PORT:-3200}
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        filterByTraceID: true
        filterBySpanID: true
        tags:
          - key: service.name
            value: telecom-api
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: loki
