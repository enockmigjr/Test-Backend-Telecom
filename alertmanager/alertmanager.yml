# ============================================================
# Alertmanager — Configuration
# ============================================================
# Les valeurs ci-dessous sont pour le développement local
# (Docker Compose avec Mailpit pour les emails).
#
# Pour la production, remplacer :
#   - smtp_smarthost → votre serveur SMTP réel (ex: smtp.example.com:587)
#   - smtp_from       → une adresse email valide
#   - email to        → les adresses de l'équipe ops
#   - WhatsApp phone  → le numéro du responsable (via CallMeBot)
#   - WhatsApp apikey → la clé API CallMeBot
# ============================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: 'mailpit:1025'           # Prod: smtp.example.com:587
  smtp_from: 'alertmanager@telecom-tickets.local'
  smtp_require_tls: false                   # Prod: true
  smtp_hello: 'telecom-tickets.local'

templates:
  - '/etc/alertmanager/templates/telecom.tmpl'

route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # ── Alertes critiques → email + WhatsApp ──
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 1h

    # ── Alertes warning → email seulement ──
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_interval: 10m
      repeat_interval: 8h

    # ── Alertes info → silencieux ──
    - match:
        severity: info
      receiver: 'null'

inhibit_rules:
  - source_match:
      alertname: 'ApiDown'
    target_match_re:
      alertname: 'HighErrorRate|HighLatency|SlaBreachRate'
    equal: ['service']

receivers:
  # ── Défaut (log interne) ──
  - name: 'default'
    email_configs:
      - to: 'ops@telecom-tickets.local'    # Prod: equipe-ops@votre-domaine.com
        headers:
          Subject: '[Telecom] {{ .GroupLabels.alertname }} ({{ .GroupLabels.severity }})'
        html: '{{ template "telecom.email.html" . }}'

  # ── Critique : Email + WhatsApp ──
  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@telecom-tickets.local'  # Prod: astreinte@votre-domaine.com
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} — Action requise'
        html: '{{ template "telecom.email.html" . }}'

    # WhatsApp via CallMeBot (gratuit, ~80 msg/jour)
    # Obtenir la clé API : envoyer "I allow callmebot to send me messages" au +34 644 51 95 23 sur WhatsApp
    # Prod : remplacer phone et apikey par vos identifiants
    webhook_configs:
      - url: 'https://api.callmebot.com/whatsapp.php?phone=22967391224&text=ALERTE%20Telecom%20Ticket%20Management&apikey=7499427'
        send_resolved: true
        http_config:
          follow_redirects: true

  # ── Warning : Email seulement ──
  - name: 'warning-alerts'
    email_configs:
      - to: 'ops@telecom-tickets.local'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'
        html: '{{ template "telecom.email.html" . }}'

  # ── Silencieux ──
  - name: 'null'
