global:
  resolve_timeout: 5m
  smtp_smarthost: 'mailpit:1025'
  smtp_from: 'alertmanager@telecom-tickets.local'
  smtp_require_tls: false
  smtp_hello: 'telecom-tickets.local'

templates:
  - '/etc/alertmanager/templates/telecom.tmpl'

route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_interval: 10m
      repeat_interval: 8h

    - match:
        severity: info
      receiver: 'null'

inhibit_rules:
  - source_match:
      alertname: 'ApiDown'
    target_match_re:
      alertname: 'HighErrorRate|HighLatency|SlaBreachRate'
    equal: ['service']

receivers:
  - name: 'default'
    email_configs:
      - to: 'ops@telecom-tickets.local'
        headers:
          Subject: '[Telecom] {{ .GroupLabels.alertname }} ({{ .GroupLabels.severity }})'
        html: '{{ template "telecom.email.html" . }}'

  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@telecom-tickets.local'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} — Action requise'
        html: '{{ template "telecom.email.html" . }}'
    # WhatsApp via CallMeBot — configurable via variables d'environnement dans docker-compose
    webhook_configs:
      - url: 'https://api.callmebot.com/whatsapp.php?phone=22967391224&text=ALERTE%20Telecom%20Ticket%20Management&apikey=7499427'
        send_resolved: true
        http_config:
          follow_redirects: true

  - name: 'warning-alerts'
    email_configs:
      - to: 'ops@telecom-tickets.local'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'
        html: '{{ template "telecom.email.html" . }}'

  - name: 'null'
