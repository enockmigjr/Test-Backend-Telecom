global:
  resolve_timeout: 5m
  smtp_smarthost: 'mailpit:1025'
  smtp_from: 'alertmanager@telecom-tickets.local'
  smtp_require_tls: false
  smtp_hello: 'telecom-tickets.local'

# Templates pour les notifications
templates:
  - '/etc/alertmanager/templates/telecom.tmpl'

# Routage des alertes
route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Alertes critiques → email + WhatsApp
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 1h

    # Alertes warning → email seulement
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_interval: 10m
      repeat_interval: 8h

    # Alertes info → pas de notification (log only)
    - match:
        severity: info
      receiver: 'null'

# Inhibitions : une alerte ApiDown supprime les autres alertes
inhibit_rules:
  - source_match:
      alertname: 'ApiDown'
    target_match_re:
      alertname: 'HighErrorRate|HighLatency|SlaBreachRate'
    equal: ['service']

receivers:
  # ─── Receiver par défaut (log interne) ──────────────────────
  - name: 'default'
    email_configs:
      - to: 'ops@telecom-tickets.local'
        headers:
          Subject: '[Telecom] {{ .GroupLabels.alertname }} ({{ .GroupLabels.severity }})'
        html: '{{ template "telecom.email.html" . }}'

  # ─── Alertes critiques : Email + Webhook ──────────────────────
  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@telecom-tickets.local'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} — Action requise'
        html: '{{ template "telecom.email.html" . }}'
    # WhatsApp via CallMeBot (décommenter après avoir obtenu la clé API) :
    # 1. Ajouter +34 644 51 95 23 dans vos contacts WhatsApp
    # 2. Envoyer "I allow callmebot to send me messages" à ce contact
    # 3. Vous recevrez votre API key — remplacer PHONE et APIKEY ci-dessous
    # 4. Décommenter le bloc webhook_configs ci-dessous
    webhook_configs:
      - url: 'https://api.callmebot.com/whatsapp.php?phone=22967391224&text=This+is+a+test&apikey=7499427'
        send_resolved: true
        http_config:
          follow_redirects: true
          max_alerts: 5

  # ─── Alertes warning : Email seulement ──────────────────────
  - name: 'warning-alerts'
    email_configs:
      - to: 'ops@telecom-tickets.local'
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }}'
        html: '{{ template "telecom.email.html" . }}'

  # ─── Receiver vide (supprime les alertes) ───────────────────
  - name: 'null'
