server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  - job_name: telecom-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(telecom-.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_name']
        regex: '/(telecom-.*)'
        action: keep

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            correlationId: correlationId
            context: context
            time: time
            durationMs: durationMs
            statusCode: statusCode
            method: method
            url: url
            ip: ip
            userAgent: userAgent

      - timestamp:
          source: time
          format: RFC3339

      - match:
          selector: '{service="api"}'
          stages:
            - regex:
                expression: '^\[[^\]]+\]\s+(?P<detected_level>[A-Z]+)\s+\(\d+\):\s+(?P<json_payload>\{.*\})$'
            - json:
                source: json_payload
                expressions:
                  correlationId: correlationId
                  context: context
                  method: method
                  url: url
                  message: message
            - template:
                source: final_level
                template: '{{ if .detected_level }}{{ ToLower .detected_level }}{{ else if .level }}{{ ToLower .level }}{{ else }}info{{ end }}'
            - labels:
                level: final_level
                correlationId:
                context:
            - static_labels:
                service_name: telecom-api
                log_type: application

      - match:
          selector: '{service="postgres"}'
          stages:
            - regex:
                expression: '^(?P<pg_ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3} UTC) \[(?P<pg_pid>\d+)\] (?P<pg_level>[A-Z]+):\s+(?P<pg_msg>.*)$'
            - timestamp:
                source: pg_ts
                format: '2006-01-02 15:04:05.000 MST'
            - template:
                source: pg_level
                template: '{{ ToLower .Value }}'
            - labels:
                level: pg_level
            - static_labels:
                service_name: postgresql
                log_type: database

      - match:
          selector: '{service="redis"}'
          stages:
            - regex:
                expression: '^(?P<redis_pid>\d+):(?P<redis_role>[A-Z]) (?P<redis_ts>\d{2} \w{3} \d{4} \d{2}:\d{2}:\d{2}\.\d{3}) (?P<redis_sym>[.*#\-]) (?P<redis_msg>.*)$'
            - timestamp:
                source: redis_ts
                format: '02 Jan 2006 15:04:05.000'
            - template:
                source: redis_sym
                template: '{{ if eq .Value "." }}debug{{ else if eq .Value "#" }}info{{ else if eq .Value "*" }}notice{{ else if eq .Value "-" }}verbose{{ else }}info{{ end }}'
            - labels:
                level: redis_sym
            - static_labels:
                service_name: redis
                log_type: cache

      - match:
          selector: '{service="nginx"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<nginx_ts>[^\]]+)\] "(?P<http_method>\S+) (?P<http_url>\S+) (?P<http_proto>[^"]+)" (?P<http_status>\d+) (?P<body_bytes>\d+) "(?P<referrer>[^"]*)" "(?P<user_agent>[^"]*)"'
            - timestamp:
                source: nginx_ts
                format: '02/Jan/2006:15:04:05 -0700'
            - labels:
                http_status:
                http_method:
            - static_labels:
                service_name: nginx
                log_type: proxy

      - match:
          selector: '{service="prometheus"}'
          stages:
            - labels:
                level:
            - static_labels:
                service_name: prometheus
                log_type: infrastructure

      - match:
          selector: '{service="loki"}'
          stages:
            - labels:
                level:
            - static_labels:
                service_name: loki
                log_type: infrastructure

      - match:
          selector: '{service="tempo"}'
          stages:
            - labels:
                level:
            - static_labels:
                service_name: tempo
                log_type: infrastructure

      - match:
          selector: '{service="grafana"}'
          stages:
            - labels:
                level:
            - static_labels:
                service_name: grafana
                log_type: infrastructure

      - match:
          selector: '{service="promtail"}'
          stages:
            - labels:
                level:
            - static_labels:
                service_name: promtail
                log_type: infrastructure

      - match:
          selector: '{service="alertmanager"}'
          stages:
            - labels:
                level:
            - static_labels:
                service_name: alertmanager
                log_type: infrastructure

      - match:
          selector: '{service="uptime-kuma"}'
          stages:
            - labels:
                level:
            - static_labels:
                service_name: uptime-kuma
                log_type: infrastructure

      - match:
          selector: '{service="mailpit"}'
          stages:
            - static_labels:
                service_name: mailpit
                log_type: infrastructure

      - match:
          selector: '{service!~"api|postgres|redis|nginx|prometheus|loki|tempo|grafana|promtail|alertmanager|uptime-kuma|mailpit"}'
          stages:
            - static_labels:
                service_name: unknown
                log_type: infrastructure
